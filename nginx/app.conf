# =============================================================================
# Fullstack Turborepo Starter - Nginx Configuration for yourdomain.com
# =============================================================================
# This configuration routes traffic based on URL paths:
#   - /admin → Admin Panel (Next.js)
#   - /api   → Backend API (NestJS)
#   - /      → Public Website (Next.js)
# =============================================================================

# =============================================================================
# Rate Limiting Zones (Defense in Depth)
# =============================================================================
# Multi-tier rate limiting to prevent DOS attacks and API abuse
# Works in conjunction with NestJS @nestjs/throttler

# GraphQL API Rate Limiting
# - 10 requests per second per IP (burst: 20)
# - Protects against query flooding
limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=10r/s;

# General API Rate Limiting
# - 100 requests per minute per IP (burst: 50)
# - Protects REST endpoints (file uploads, etc.)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# Admin Panel Rate Limiting (Optional - currently disabled)
# - 30 requests per second per IP (burst: 50)
# - Uncomment limit_req in /admin location to enable
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=30r/s;

# Login/Authentication Rate Limiting
# - 5 requests per minute per IP (no burst)
# - Protects against brute force attacks
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# =============================================================================

# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Upstream definitions
upstream backend {
    server backend:4000;
}

upstream admin {
    server admin:3001;
}

upstream website {
    server website:3000;
}

# =============================================================================
# HTTPS Server (Production)
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name yourdomain.com www.yourdomain.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_trusted_certificate is optional for Cloudflare Origin Certificates
    # ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # SSL Security Settings (Modern Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/app-access.log;
    error_log /var/log/nginx/app-error.log warn;

    # Max upload size - Increased to 50MB for large content (e.g., resume PDFs)
    # Default is 1MB which is too small for modern applications
    # This affects both file uploads and POST request bodies
    client_max_body_size 50M;

    # =============================================================================
    # ADMIN PANEL ROUTING (Path: /admin - Next.js basePath Approach)
    # =============================================================================
    # How it works:
    # 1. Nginx proxies: /admin/* → admin:3001/admin/* (NO rewriting!)
    # 2. Next.js basePath: Handles /admin prefix automatically
    # 3. All routes, links, redirects, and assets work automatically
    #
    # Benefits:
    # ✅ Simpler nginx config - just proxy_pass, no rewriting
    # ✅ Next.js handles ALL path logic (routes, assets, redirects)
    # ✅ No manual prefix needed in code - automatic everywhere
    # ✅ Official Next.js feature - well-tested and documented
    # =============================================================================

    # All /admin requests - simple proxy (no rewriting needed)
    location /admin {
        # Optional: IP Whitelist (Uncomment and add your IPs for extra security)
        # allow 1.2.3.4;        # Your office IP
        # allow 5.6.7.8;        # Your home IP
        # deny all;

        # Optional: Rate limiting for admin (Uncomment to enable)
        # limit_req zone=admin_limit burst=10 nodelay;

        # Simple proxy - Next.js basePath handles everything
        proxy_pass http://admin;
        proxy_http_version 1.1;

        # WebSocket support (for Next.js HMR in development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Disable caching for admin panel
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =============================================================================
    # BACKEND API ROUTING (Path: /api)
    # =============================================================================
    # This section routes all requests to /api/* to the backend container
    # The backend NestJS app serves GraphQL at /graphql
    # =============================================================================

    # File upload endpoints (POST) - MUST come before /api/uploads (static files)
    # This handles: /api/upload/avatar, /api/upload/resume, /api/upload/article-image, etc.
    location ~ ^/api/upload/ {
        # Apply general API rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # Strip /api prefix when forwarding to backend
        # /api/upload/avatar → /upload/avatar
        rewrite ^/api/(.*) /$1 break;

        # Proxy to backend container
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Keep connection alive
        proxy_set_header Connection "";

        # Upload timeouts (longer for large files)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Disable caching for upload responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Backend static file serving (GET only) - For already uploaded files
    # This handles: /api/uploads/avatars/*, /api/uploads/article-images/*, etc.
    location /api/uploads {
        # Apply general API rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # SECURITY: Prevent execution of uploaded files
        # Force download instead of inline display (defense in depth)
        add_header Content-Disposition "inline";
        add_header X-Content-Type-Options "nosniff" always;

        # Block execution of scripts/executables in upload directory
        location ~ /api/uploads/.*\.(php|pl|py|jsp|asp|sh|cgi|exe|bat|cmd)$ {
            deny all;
            return 403;
        }

        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache uploaded images for 30 days
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Backend Auth endpoints - STRICT rate limiting for brute force protection
    location ~ ^/api/auth/(login|refresh) {
        # Apply STRICT login rate limiting (5 requests per minute per IP)
        limit_req zone=login_limit nodelay;

        # Strip /api prefix when forwarding to backend
        rewrite ^/api/(.*) /$1 break;

        # Proxy to backend container
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable caching for auth responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Backend API - GraphQL endpoint
    location /api/graphql {
        # Apply GraphQL rate limiting (10 req/sec, burst 20)
        limit_req zone=graphql_limit burst=20 nodelay;
        # NOTE: Removed login_limit here - it was too restrictive for all GraphQL requests
        # Auth mutations are already rate-limited by NestJS @nestjs/throttler

        # Strip /api prefix when forwarding to backend
        rewrite ^/api/(.*) /$1 break;

        # Proxy to backend container
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Keep connection alive
        proxy_set_header Connection "";

        # GraphQL timeouts (longer for complex queries)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable caching for API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api {
        # Apply general API rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # Strip /api prefix when forwarding to backend
        rewrite ^/api/(.*) /$1 break;

        # Proxy to backend container
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Keep connection alive
        proxy_set_header Connection "";

        # GraphQL timeouts (longer for complex queries)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable caching for API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # =============================================================================
    # WEBSITE ROUTING (Path: /)
    # =============================================================================
    # This section routes all other requests to the website container
    # This is the default/fallback location
    # IMPORTANT: This MUST come after /admin and /api locations!
    # =============================================================================
    location / {
        # Proxy to website container
        proxy_pass http://website;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Cache bypass for dynamic content
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Website static assets (_next/static)
    location /_next/static {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache Next.js static assets aggressively
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Website images
    location /images {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache images for 30 days
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Favicon and app icons (cached aggressively)
    location = /favicon.ico {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # App icons (PWA, OG, Apple touch icons)
    location ~ ^/(icon-.*\.png|apple-touch-icon\.png|og-image\.png)$ {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;


        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Admin app icons (with /admin prefix)
    location ~ ^/admin/(icon-.*\.png|apple-touch-icon\.png|favicon\.ico)$ {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }
}

# =============================================================================
# HTTP to HTTPS Redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name yourdomain.com www.yourdomain.com;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://yourdomain.com$request_uri;
    }
}
